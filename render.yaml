services:
  - type: web
    name: tegra-spec-manager-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run prisma:generate && npm run prisma:deploy
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
